<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Citas - Patitas al Rescate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .table thead { background-color: #ff8c00; color: white; }
        .table tbody tr:hover { background-color: #fff3e0; }
        .page-icon { font-size: 2rem; color: #ff8c00; }
    </style>
</head>
<body>
    <header id="app-header"></header>

    <div class="container my-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="bi bi-calendar-check page-icon"></i> Mis Citas</h1>
            <a id="link-agendar" href="#" class="btn btn-warning">
                <i class="bi bi-plus-circle"></i> Agendar Cita
            </a>
        </div>
        <div id="alert-box"></div>
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead><tr><th>ID</th><th>Mascota</th><th>Veterinario</th><th>Fecha</th><th>Estado</th><th>Acciones</th></tr></thead>
                <tbody id="citas-body">
                    <tr><td colspan="6" class="text-center">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer id="app-footer"></footer>

    <script src="../../shared/js/api.js"></script>
    <script src="../../shared/js/auth.js"></script>
    <script src="../../shared/js/components.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="mis-citas.js"></script>
</body>
</html>
