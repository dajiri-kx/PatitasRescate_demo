<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patitas al Rescate - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Roboto', sans-serif; }
        .container { margin-top: 20px; margin-bottom: 20px; }
        .card { border: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .section-title { font-size: 1.5rem; font-weight: bold; color: #007bff; margin-bottom: 20px; }
        .table { border-radius: 10px; overflow: hidden; }
        .table thead { background-color: #007bff; color: white; }
        .table tbody tr:hover { background-color: #f1f1f1; }
        .alert { border-radius: 10px; }
    </style>
</head>
<body>
    <header id="app-header"></header>

    <div class="container">
        <h1 class="text-center mb-4">Bienvenido al Dashboard</h1>
        <div id="alert-box"></div>

        <!-- Perfil del Cliente -->
        <section class="mb-5">
            <h2 class="section-title">Perfil del Cliente</h2>
            <div class="card">
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6" id="perfil-info">
                            <p><strong>Cargando perfil...</strong></p>
                        </div>
                        <div class="col-md-6 text-end">
                            <a id="link-editar-perfil" href="#" class="btn btn-warning">Editar Perfil</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Mascotas -->
        <section class="mb-5">
            <div class="d-flex justify-content-between align-items-center my-2">
                <h2 class="section-title">Mascotas</h2>
                <a id="link-agregar-mascota" href="#" class="btn btn-warning">Agregar Mascota</a>
            </div>
            <div class="table-responsive">
                <table class="table table-striped">
                    <thead><tr><th>Nombre</th><th>Raza</th><th>Edad (meses)</th><th>Acciones</th></tr></thead>
                    <tbody id="mascotas-body">
                        <tr><td colspan="4" class="text-center">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Citas -->
        <section class="mb-5">
            <div class="d-flex justify-content-between align-items-center my-2">
                <h2 class="section-title">Citas Agendadas</h2>
                <a id="link-agendar-cita" href="#" class="btn btn-warning">Agendar Nueva Cita</a>
            </div>
            <div class="table-responsive">
                <table class="table table-striped">
                    <thead><tr><th>ID</th><th>Mascota</th><th>Fecha</th><th>Estado</th><th>Acciones</th></tr></thead>
                    <tbody id="citas-body">
                        <tr><td colspan="5" class="text-center">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Facturas -->
        <section class="mb-5">
            <h2 class="section-title">Facturas</h2>
            <div id="facturas-container">
                <div class="alert alert-info">Cargando facturas...</div>
            </div>
        </section>
    </div>

    <footer id="app-footer"></footer>

    <script src="../../shared/js/api.js"></script>
    <script src="../../shared/js/auth.js"></script>
    <script src="../../shared/js/components.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
