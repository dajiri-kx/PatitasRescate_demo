<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agendar Cita</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.2/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
    <header id="app-header"></header>

    <div class="container my-5">
        <div class="text-center mb-4">
            <img src="https://okvet.co/wp-content/uploads/2020/06/que-es-una-veterinaria.jpg"
                 alt="Veterinaria" class="img-fluid rounded shadow" style="max-height: 250px; object-fit: cover;">
        </div>

        <h1 class="text-center" style="color: #ffc107;">Agendar Cita</h1>

        <div id="alert-box"></div>

        <form id="agendarForm">
            <div class="mb-3">
                <label for="id_mascota" class="form-label">Selecciona la Mascota:</label>
                <select name="id_mascota" id="id_mascota" class="form-select" required>
                    <option value="">-- Cargando mascotas --</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="fecha" class="form-label">Fecha:</label>
                <input type="date" name="fecha" id="fecha" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="hora" class="form-label">Hora:</label>
                <select name="hora" id="hora" class="form-select" required></select>
            </div>

            <div class="mb-3">
                <label class="form-label">Selecciona los Servicios:</label>
                <div id="servicios-container">Cargando servicios...</div>
            </div>

            <div class="mb-3">
                <label for="veterinario" class="form-label">Selecciona el Veterinario:</label>
                <select name="veterinario" id="veterinario" class="form-select" required>
                    <option value="">-- Cargando veterinarios --</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary" id="btnSubmit">Agendar Cita</button>
            <a id="link-dashboard" href="#" class="btn btn-link mt-3">Volver al Dashboard</a>
        </form>
    </div>

    <footer id="app-footer"></footer>

    <script src="../../../shared/js/api.js"></script>
    <script src="../../../shared/js/auth.js"></script>
    <script src="../../../shared/js/components.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="agendar-cita.js"></script>
</body>
</html>
