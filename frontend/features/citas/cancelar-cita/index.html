<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancelar Cita</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.2/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
    <header id="app-header"></header>

    <div class="container my-5">
        <h1 class="text-center">Cancelar Cita</h1>

        <div id="alert-box"></div>

        <form id="cancelarForm">
            <div class="mb-3">
                <label for="id_cita" class="form-label">Selecciona la cita a cancelar:</label>
                <select name="id_cita" id="id_cita" class="form-select" required>
                    <option value="">-- Cargando citas --</option>
                </select>
            </div>

            <button type="submit" class="btn btn-danger" id="btnSubmit">Cancelar Cita</button>
        </form>

        <a id="link-dashboard" href="#" class="btn btn-link mt-3">Volver al Dashboard</a>
    </div>

    <footer id="app-footer"></footer>

    <script src="../../../shared/js/api.js"></script>
    <script src="../../../shared/js/auth.js"></script>
    <script src="../../../shared/js/components.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="cancelar-cita.js"></script>
</body>
</html>
