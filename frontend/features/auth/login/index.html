<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.2/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
    <header id="app-header"></header>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header text-center">
                        <h4>Iniciar Sesión</h4>
                    </div>
                    <div class="card-body">
                        <div id="alert-box"></div>
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="username" class="form-label">Correo Electrónico</label>
                                <input type="email" class="form-control" id="username" name="username" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary" id="btnSubmit">Iniciar Sesión</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer id="app-footer"></footer>

    <script src="../../../shared/js/api.js"></script>
    <script src="../../../shared/js/auth.js"></script>
    <script src="../../../shared/js/components.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
        const alertBox = document.getElementById('alert-box');
        const params = new URLSearchParams(window.location.search);
        if (params.get('registered')) {
            alertBox.innerHTML = '<div class="alert alert-success">Cliente registrado exitosamente. Por favor, inicie sesión.</div>';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            alertBox.innerHTML = '';
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.textContent = 'Ingresando...';

            try {
                const res = await apiPost('/auth/login', {
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value,
                });
                Auth.save(res.data);
                if (res.data.rol === 0) {
                    window.location.href = nav('/admin/');
                } else if (res.data.rol === 2) {
                    window.location.href = nav('/veterinario/');
                } else {
                    window.location.href = nav('/dashboard/');
                }
            } catch (err) {
                alertBox.innerHTML = `<div class="alert alert-danger">${escapeHtml(err.message)}</div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Iniciar Sesión';
            }
        });
    </script>
</body>
</html>
