<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Veterinario — Patitas al Rescate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="../../shared/css/admin.css" rel="stylesheet">
    <link href="../../shared/css/vet.css" rel="stylesheet">
</head>
<body>
    <script src="../../shared/js/api.js"></script>
    <script src="../../shared/js/auth.js"></script>
    <script src="../../shared/js/vet-layout.js"></script>
    <script>
        renderVetLayout('panel');

        const fb = CONFIG.FRONTEND_BASE;
        const content = document.getElementById('vet-content');
        content.innerHTML = `
            <div style="text-align:center;margin-top:40px;">
                <h1 style="font-size:28px;">Mi Panel</h1>
                <p class="text-muted">Bienvenido a tu espacio de trabajo</p>
            </div>
            <div class="dash-cards" id="dash-cards">
                <div class="dash-card teal">
                    <div class="dash-icon"><i class="bi bi-calendar-event"></i></div>
                    <h3>Citas Hoy</h3>
                    <div class="dash-count" id="count-hoy">-</div>
                </div>
                <div class="dash-card blue">
                    <div class="dash-icon"><i class="bi bi-clock-history"></i></div>
                    <h3>Pendientes</h3>
                    <div class="dash-count" id="count-pendientes">-</div>
                </div>
                <div class="dash-card green">
                    <div class="dash-icon"><i class="bi bi-check-circle"></i></div>
                    <h3>Completadas</h3>
                    <div class="dash-count" id="count-completadas">-</div>
                </div>
            </div>
            <div style="text-align:center;margin-top:32px;">
                <a href="${fb}/veterinario/agenda/" class="btn-admin primary" style="font-size:15px;padding:12px 32px;">
                    <i class="bi bi-calendar-check me-1"></i> Ver Mi Agenda
                </a>
            </div>
            <div style="margin-top:48px;font-size:12px;color:var(--admin-text-sec);text-align:center;">
                &copy; 2025 Patitas al Rescate &middot; Portal Veterinario
            </div>`;

        (async () => {
            try {
                const res = await apiGet('/vet/stats');
                const d = res.data;
                document.getElementById('count-hoy').textContent = d.citas_hoy;
                document.getElementById('count-pendientes').textContent = d.citas_pendientes;
                document.getElementById('count-completadas').textContent = d.citas_completadas;
            } catch (e) {
                console.error('Stats error:', e);
            }
        })();
    </script>
</body>
</html>
