<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Agenda — Veterinario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="../../../shared/css/admin.css" rel="stylesheet">
    <link href="../../../shared/css/vet.css" rel="stylesheet">
</head>
<body>
    <script src="../../../shared/js/api.js"></script>
    <script src="../../../shared/js/auth.js"></script>
    <script src="../../../shared/js/vet-layout.js"></script>
    <script>
        renderVetLayout('agenda');
        const content = document.getElementById('vet-content');

        let allCitas = [];

        async function loadData() {
            content.innerHTML = `
                <div class="page-header">
                    <div><h2><i class="bi bi-calendar-check" style="color:#26a69a;"></i> Mi Agenda</h2>
                    <p class="muted">Citas asignadas a tu cargo</p></div>
                </div>
                <div id="vet-alert" class="admin-alert" style="display:none;"></div>
                <div style="margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
                    <select id="filter-estado" class="input-admin" style="width:auto;">
                        <option value="">Todos los estados</option>
                        <option value="Activa" selected>Activa</option>
                        <option value="Completada">Completada</option>
                        <option value="Cancelada">Cancelada</option>
                    </select>
                    <input type="date" id="filter-fecha" class="input-admin" style="width:auto;">
                </div>
                <div class="admin-table-wrap"><table class="admin-table">
                    <thead><tr>
                        <th>Fecha</th><th>Mascota</th><th>Especie</th>
                        <th>Dueño</th><th>Teléfono</th><th>Servicios</th>
                        <th>Total</th><th>Estado</th><th style="text-align:right;">Acciones</th>
                    </tr></thead>
                    <tbody id="tbody">
                        <tr><td colspan="9" class="text-muted" style="text-align:center;">Cargando...</td></tr>
                    </tbody>
                </table></div>`;

            document.getElementById('filter-estado').addEventListener('change', renderTable);
            document.getElementById('filter-fecha').addEventListener('change', renderTable);

            try {
                const res = await apiGet('/vet/citas');
                allCitas = res.data;
                renderTable();
            } catch (e) { showVetAlert(e.message, 'error'); }
        }

        function renderTable() {
            const estado = document.getElementById('filter-estado').value;
            const fecha = document.getElementById('filter-fecha').value;
            let filtered = allCitas;
            if (estado) filtered = filtered.filter(c => c.ESTADO === estado);
            if (fecha) filtered = filtered.filter(c => c.FECHA_CITA.startsWith(fecha));

            const tbody = document.getElementById('tbody');
            if (!filtered.length) {
                tbody.innerHTML = '<tr><td colspan="9" class="text-muted" style="text-align:center;">Sin citas</td></tr>';
                return;
            }
            tbody.innerHTML = filtered.map(c => `<tr>
                <td>${esc(c.FECHA_CITA)}</td>
                <td class="text-white">${esc(c.MASCOTA)}</td>
                <td>${esc(c.ESPECIE)}${c.RAZA ? ' — ' + esc(c.RAZA) : ''}</td>
                <td>${esc(c.CLIENTE)}</td>
                <td>${esc(c.TELEFONO_CLIENTE)}</td>
                <td style="max-width:200px;font-size:13px;">${esc(c.SERVICIOS)}</td>
                <td>₡${Number(c.TOTAL).toLocaleString()}</td>
                <td><span class="status-${c.ESTADO.toLowerCase()}">${c.ESTADO}</span></td>
                <td><div class="action-btns">
                    ${c.ESTADO === 'Activa' ? `
                        <button class="action-btn edit" title="Completar" onclick="cambiarEstado(${c.ID_CITA}, 'Completada')"><i class="bi bi-check-lg"></i></button>
                        <button class="action-btn delete" title="Cancelar" onclick="cambiarEstado(${c.ID_CITA}, 'Cancelada')"><i class="bi bi-x-lg"></i></button>
                    ` : '<span class="text-muted" style="font-size:12px;">—</span>'}
                </div></td>
            </tr>`).join('');
        }

        async function cambiarEstado(id, estado) {
            const label = estado === 'Completada' ? 'completar' : 'cancelar';
            if (!confirm(`¿Seguro que desea ${label} esta cita?`)) return;
            try {
                await apiPost('/vet/citas/estado', { id, estado });
                showVetAlert(`Cita ${estado.toLowerCase()}.`, 'success');
                const res = await apiGet('/vet/citas');
                allCitas = res.data;
                renderTable();
            } catch (e) { showVetAlert(e.message, 'error'); }
        }

        function showVetAlert(msg, type) {
            const el = document.getElementById('vet-alert');
            if (!el) return;
            el.className = `admin-alert ${type}`;
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 4000);
        }

        function esc(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        loadData();
    </script>
</body>
</html>
