<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gracias por tu compra - Patitas al Rescate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.2/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
    <header id="app-header"></header>

    <div class="container mt-5 mb-5 text-center text-dark">
        <div id="pago-loading">
            <div class="spinner-border text-primary mb-3" role="status"></div>
            <p class="lead">Verificando tu pago...</p>
        </div>
        <div id="pago-exito" style="display: none;">
            <i class="fas fa-check-circle fa-5x text-success mb-4"></i>
            <h1>¡GRACIAS POR TU COMPRA!</h1>
            <p class="lead mt-3">Tu pago ha sido procesado con éxito. Apreciamos tu confianza en <strong>Patitas al Rescate</strong>.</p>
            <a id="link-dashboard" href="#" class="btn btn-primary mt-3">
                <i class="fas fa-home me-2"></i> Volver al Dashboard
            </a>
        </div>
        <div id="pago-error" style="display: none;">
            <i class="fas fa-exclamation-triangle fa-5x text-warning mb-4"></i>
            <h1>Pago no verificado</h1>
            <p class="lead mt-3" id="pago-error-msg">Hubo un problema al verificar tu pago.</p>
            <a id="link-dashboard-error" href="#" class="btn btn-primary mt-3">
                <i class="fas fa-home me-2"></i> Volver al Dashboard
            </a>
        </div>
    </div>

    <footer id="app-footer"></footer>

    <script src="../../shared/js/api.js"></script>
    <script src="../../shared/js/auth.js"></script>
    <script src="../../shared/js/components.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const dashboardUrl = nav('/dashboard/');
            document.getElementById('link-dashboard').href = dashboardUrl;
            document.getElementById('link-dashboard-error').href = dashboardUrl;

            const params = new URLSearchParams(window.location.search);
            const sessionId = params.get('session_id');

            if (!sessionId) {
                // Sin session_id, mostrar éxito genérico
                document.getElementById('pago-loading').style.display = 'none';
                document.getElementById('pago-exito').style.display = 'block';
                return;
            }

            try {
                await apiPost('/checkout/verificar', { session_id: sessionId });
                document.getElementById('pago-loading').style.display = 'none';
                document.getElementById('pago-exito').style.display = 'block';
            } catch (err) {
                document.getElementById('pago-loading').style.display = 'none';
                document.getElementById('pago-error').style.display = 'block';
                document.getElementById('pago-error-msg').textContent = err.message || 'Hubo un problema al verificar tu pago.';
            }
        });
    </script>
</body>
</html>
