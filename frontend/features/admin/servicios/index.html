<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios — Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="../../../shared/css/admin.css" rel="stylesheet">
</head>
<body>
    <script src="../../../shared/js/api.js"></script>
    <script src="../../../shared/js/auth.js"></script>
    <script src="../../../shared/js/admin-layout.js"></script>
    <script>
        renderAdminLayout('servicios');
        const content = document.getElementById('admin-content');

        const categorias = ['Consulta','Vacunación','Cirugía','Estética','Diagnóstico','General'];

        function catOptions(sel) {
            return categorias.map(c => `<option value="${c}" ${c===sel?'selected':''}>${c}</option>`).join('');
        }

        async function loadData() {
            content.innerHTML = `
                <div class="page-header">
                    <div><h2><i class="bi bi-clipboard2-pulse text-amber"></i> Servicios</h2>
                    <p class="muted">Gestión de servicios veterinarios</p></div>
                    <button class="btn-admin primary" onclick="openCreate()"><i class="bi bi-plus-lg"></i> Nuevo servicio</button>
                </div>
                <div id="admin-alert" class="admin-alert" style="display:none;"></div>
                <div class="admin-table-wrap"><table class="admin-table">
                    <thead><tr><th>ID</th><th>Nombre</th><th>Categoría</th><th>Precio</th><th>Duración</th><th style="text-align:right;">Acciones</th></tr></thead>
                    <tbody id="tbody">
                        <tr><td colspan="6" class="text-muted" style="text-align:center;">Cargando...</td></tr>
                    </tbody>
                </table></div>`;

            try {
                const res = await apiGet('/admin/servicios');
                const tbody = document.getElementById('tbody');
                if (!res.data.length) { tbody.innerHTML = '<tr><td colspan="6" class="text-muted" style="text-align:center;">Sin servicios</td></tr>'; return; }
                tbody.innerHTML = res.data.map(s => `<tr>
                    <td>${s.ID_SERVICIO}</td>
                    <td class="text-white">${esc(s.NOMBRE_SERVICIO)}</td>
                    <td>${esc(s.CATEGORIA)}</td>
                    <td class="text-amber">₡${Number(s.PRECIO).toLocaleString('es-CR')}</td>
                    <td>${s.DURACION_MINUTOS} min</td>
                    <td><div class="action-btns">
                        <button class="action-btn edit" title="Editar" onclick='openEdit(${JSON.stringify(s)})'><i class="bi bi-pencil"></i></button>
                        <button class="action-btn delete" title="Eliminar" onclick="openDelete(${s.ID_SERVICIO}, \`${esc(s.NOMBRE_SERVICIO)}\`)"><i class="bi bi-trash"></i></button>
                    </div></td>
                </tr>`).join('');
            } catch (e) { showAlert(e.message, 'error'); }
        }

        function formHtml(s) {
            s = s || {};
            return `<div class="form-grid">
                <div class="field"><label>Nombre</label><input class="input-admin" id="f-nombre" value="${esc(s.NOMBRE_SERVICIO||'')}" required></div>
                <div class="field"><label>Categoría</label><select class="input-admin" id="f-cat">${catOptions(s.CATEGORIA||'')}</select></div>
                <div class="field"><label>Precio (₡)</label><input class="input-admin" id="f-precio" type="number" step="0.01" min="0" value="${s.PRECIO||0}"></div>
                <div class="field"><label>Duración (min)</label><input class="input-admin" id="f-dur" type="number" min="0" value="${s.DURACION_MINUTOS||0}"></div>
                <div class="field full"><label>Descripción</label><textarea class="input-admin" id="f-desc">${esc(s.DESCRIPCION||'')}</textarea></div>
            </div>`;
        }

        function openCreate() {
            showModal('<i class="bi bi-plus-lg text-amber"></i> Nuevo Servicio', `
                ${formHtml()}
                <div style="margin-top:16px;display:flex;gap:8px;">
                    <button class="btn-admin primary" onclick="doCreate()"><i class="bi bi-floppy"></i> Guardar</button>
                    <button class="btn-admin ghost" onclick="closeModal()">Cancelar</button>
                </div>`);
        }

        function openEdit(s) {
            showModal('<i class="bi bi-pencil text-amber"></i> Editar Servicio', `
                ${formHtml(s)}
                <input type="hidden" id="f-id" value="${s.ID_SERVICIO}">
                <div style="margin-top:16px;display:flex;gap:8px;">
                    <button class="btn-admin primary" onclick="doEdit()"><i class="bi bi-floppy"></i> Guardar</button>
                    <button class="btn-admin ghost" onclick="closeModal()">Cancelar</button>
                </div>`);
        }

        function openDelete(id, nombre) {
            showModal('<i class="bi bi-trash text-red"></i> Eliminar Servicio', `
                <div class="delete-box">
                    <p class="text-muted">¿Eliminar este servicio?</p>
                    <h3>${nombre}</h3>
                    <p class="text-muted" style="font-size:13px;">Esta acción no se puede deshacer</p>
                    <div style="margin-top:16px;display:flex;gap:8px;justify-content:center;">
                        <button class="btn-admin danger" onclick="doDelete(${id})"><i class="bi bi-trash"></i> Sí, eliminar</button>
                        <button class="btn-admin ghost" onclick="closeModal()">Cancelar</button>
                    </div>
                </div>`);
        }

        async function doCreate() {
            try {
                await apiPost('/admin/servicios', {
                    nombre: document.getElementById('f-nombre').value,
                    descripcion: document.getElementById('f-desc').value,
                    precio: parseFloat(document.getElementById('f-precio').value),
                    duracion: parseInt(document.getElementById('f-dur').value),
                    categoria: document.getElementById('f-cat').value
                });
                closeModal(); loadData(); showAlert('Servicio creado.', 'success');
            } catch (e) { alert(e.message); }
        }

        async function doEdit() {
            try {
                await apiPost('/admin/servicios/editar', {
                    id: parseInt(document.getElementById('f-id').value),
                    nombre: document.getElementById('f-nombre').value,
                    descripcion: document.getElementById('f-desc').value,
                    precio: parseFloat(document.getElementById('f-precio').value),
                    duracion: parseInt(document.getElementById('f-dur').value),
                    categoria: document.getElementById('f-cat').value
                });
                closeModal(); loadData(); showAlert('Servicio actualizado.', 'success');
            } catch (e) { alert(e.message); }
        }

        async function doDelete(id) {
            try {
                await apiPost('/admin/servicios/eliminar', { id });
                closeModal(); loadData(); showAlert('Servicio eliminado.', 'success');
            } catch (e) { alert(e.message); }
        }

        function esc(s) { return escapeHtml(String(s)); }
        loadData();
    </script>
</body>
</html>
