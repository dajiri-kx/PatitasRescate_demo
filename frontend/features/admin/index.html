<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración — Patitas al Rescate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="../../shared/css/admin.css" rel="stylesheet">
</head>
<body>
    <script src="../../shared/js/api.js"></script>
    <script src="../../shared/js/auth.js"></script>
    <script src="../../shared/js/admin-layout.js"></script>
    <script>
        renderAdminLayout('panel');

        const fb = CONFIG.FRONTEND_BASE;
        const content = document.getElementById('admin-content');
        content.innerHTML = `
            <div style="text-align:center;margin-top:40px;">
                <h1 style="font-size:28px;">Panel de Control</h1>
                <p class="text-muted">Selecciona un módulo para gestionar la veterinaria</p>
            </div>
            <div class="dash-cards" id="dash-cards">
                <a href="${fb}/admin/servicios/" class="dash-card orange">
                    <div class="dash-icon"><i class="bi bi-clipboard2-pulse"></i></div>
                    <h3>Servicios</h3>
                    <div class="dash-count" id="count-servicios">-</div>
                </a>
                <a href="${fb}/admin/veterinarios/" class="dash-card blue">
                    <div class="dash-icon"><i class="bi bi-person-badge"></i></div>
                    <h3>Veterinarios</h3>
                    <div class="dash-count" id="count-veterinarios">-</div>
                </a>
                <a href="${fb}/admin/clientes/" class="dash-card green">
                    <div class="dash-icon"><i class="bi bi-people"></i></div>
                    <h3>Clientes</h3>
                    <div class="dash-count" id="count-clientes">-</div>
                </a>
                <a href="${fb}/admin/citas/" class="dash-card red">
                    <div class="dash-icon"><i class="bi bi-calendar-check"></i></div>
                    <h3>Citas Activas</h3>
                    <div class="dash-count" id="count-citas">-</div>
                </a>
            </div>
            <div style="margin-top:48px;font-size:12px;color:var(--admin-text-sec);text-align:center;">
                &copy; 2025 Patitas al Rescate &middot; Panel Administrativo
            </div>`;

        (async () => {
            try {
                const res = await apiGet('/admin/stats');
                const d = res.data;
                document.getElementById('count-servicios').textContent = d.servicios;
                document.getElementById('count-veterinarios').textContent = d.veterinarios;
                document.getElementById('count-clientes').textContent = d.clientes;
                document.getElementById('count-citas').textContent = d.citas_activas;
            } catch (e) {
                console.error('Stats error:', e);
            }
        })();
    </script>
</body>
</html>
