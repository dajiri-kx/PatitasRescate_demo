<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veterinarios — Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="../../../shared/css/admin.css" rel="stylesheet">
</head>
<body>
    <script src="../../../shared/js/api.js"></script>
    <script src="../../../shared/js/auth.js"></script>
    <script src="../../../shared/js/admin-layout.js"></script>
    <script>
        renderAdminLayout('veterinarios');
        const content = document.getElementById('admin-content');

        async function loadData() {
            content.innerHTML = `
                <div class="page-header">
                    <div><h2><i class="bi bi-person-badge text-amber"></i> Veterinarios</h2>
                    <p class="muted">Equipo profesional de la clínica</p></div>
                    <button class="btn-admin primary" onclick="openCreate()"><i class="bi bi-plus-lg"></i> Nuevo veterinario</button>
                </div>
                <div id="admin-alert" class="admin-alert" style="display:none;"></div>
                <div class="admin-table-wrap"><table class="admin-table">
                    <thead><tr><th>ID</th><th>Identificación</th><th>Nombre</th><th>Especialidad</th><th>Teléfono</th><th>Correo</th><th style="text-align:right;">Acciones</th></tr></thead>
                    <tbody id="tbody">
                        <tr><td colspan="7" class="text-muted" style="text-align:center;">Cargando...</td></tr>
                    </tbody>
                </table></div>`;

            try {
                const res = await apiGet('/admin/veterinarios');
                const tbody = document.getElementById('tbody');
                if (!res.data.length) { tbody.innerHTML = '<tr><td colspan="7" class="text-muted" style="text-align:center;">Sin veterinarios</td></tr>'; return; }
                tbody.innerHTML = res.data.map(v => `<tr>
                    <td>${v.ID_VETERINARIO}</td>
                    <td>${esc(v.DIDENTIDAD_VETERINARIO)}</td>
                    <td class="text-white">${esc(v.NOMBRE)}</td>
                    <td>${esc(v.ESPECIALIDAD)}</td>
                    <td>${esc(v.TELEFONO)}</td>
                    <td>${esc(v.CORREO)}</td>
                    <td><div class="action-btns">
                        <button class="action-btn edit" title="Editar" onclick='openEdit(${JSON.stringify(v)})'><i class="bi bi-pencil"></i></button>
                        <button class="action-btn delete" title="Eliminar" onclick="openDelete(${v.ID_VETERINARIO}, \`${esc(v.NOMBRE)}\`)"><i class="bi bi-trash"></i></button>
                    </div></td>
                </tr>`).join('');
            } catch (e) { showAlert(e.message, 'error'); }
        }

        function formHtml(v) {
            v = v || {};
            const especs = ['General','Cirugía','Dermatología','Cardiología','Oftalmología','Odontología','Oncología','Neurología'];
            const espOpts = especs.map(e => `<option value="${e}" ${e===(v.ESPECIALIDAD||'')?'selected':''}>${e}</option>`).join('');
            return `<div class="form-grid">
                <div class="field"><label>Identificación</label><input class="input-admin" id="f-ident" value="${esc(v.DIDENTIDAD_VETERINARIO||'')}" required></div>
                <div class="field"><label>Nombre</label><input class="input-admin" id="f-nombre" value="${esc(v.NOMBRE||'')}" required></div>
                <div class="field"><label>Especialidad</label><select class="input-admin" id="f-esp">${espOpts}</select></div>
                <div class="field"><label>Teléfono</label><input class="input-admin" id="f-tel" value="${esc(v.TELEFONO||'')}"></div>
                <div class="field"><label>Correo</label><input class="input-admin" id="f-correo" type="email" value="${esc(v.CORREO||'')}"></div>
            </div>`;
        }

        function openCreate() {
            showModal('<i class="bi bi-plus-lg text-amber"></i> Nuevo Veterinario', `
                ${formHtml()}
                <div style="margin-top:16px;display:flex;gap:8px;">
                    <button class="btn-admin primary" onclick="doCreate()"><i class="bi bi-floppy"></i> Guardar</button>
                    <button class="btn-admin ghost" onclick="closeModal()">Cancelar</button>
                </div>`);
        }

        function openEdit(v) {
            showModal('<i class="bi bi-pencil text-amber"></i> Editar Veterinario', `
                ${formHtml(v)}
                <input type="hidden" id="f-id" value="${v.ID_VETERINARIO}">
                <div style="margin-top:16px;display:flex;gap:8px;">
                    <button class="btn-admin primary" onclick="doEdit()"><i class="bi bi-floppy"></i> Guardar</button>
                    <button class="btn-admin ghost" onclick="closeModal()">Cancelar</button>
                </div>`);
        }

        function openDelete(id, nombre) {
            showModal('<i class="bi bi-trash text-red"></i> Eliminar Veterinario', `
                <div class="delete-box">
                    <p class="text-muted">¿Eliminar este veterinario?</p>
                    <h3>${nombre}</h3>
                    <p class="text-muted" style="font-size:13px;">Esta acción no se puede deshacer</p>
                    <div style="margin-top:16px;display:flex;gap:8px;justify-content:center;">
                        <button class="btn-admin danger" onclick="doDelete(${id})"><i class="bi bi-trash"></i> Sí, eliminar</button>
                        <button class="btn-admin ghost" onclick="closeModal()">Cancelar</button>
                    </div>
                </div>`);
        }

        async function doCreate() {
            try {
                await apiPost('/admin/veterinarios', {
                    didentidad: document.getElementById('f-ident').value,
                    nombre: document.getElementById('f-nombre').value,
                    especialidad: document.getElementById('f-esp').value,
                    telefono: document.getElementById('f-tel').value,
                    correo: document.getElementById('f-correo').value
                });
                closeModal(); loadData(); showAlert('Veterinario creado.', 'success');
            } catch (e) { alert(e.message); }
        }

        async function doEdit() {
            try {
                await apiPost('/admin/veterinarios/editar', {
                    id: parseInt(document.getElementById('f-id').value),
                    didentidad: document.getElementById('f-ident').value,
                    nombre: document.getElementById('f-nombre').value,
                    especialidad: document.getElementById('f-esp').value,
                    telefono: document.getElementById('f-tel').value,
                    correo: document.getElementById('f-correo').value
                });
                closeModal(); loadData(); showAlert('Veterinario actualizado.', 'success');
            } catch (e) { alert(e.message); }
        }

        async function doDelete(id) {
            try {
                await apiPost('/admin/veterinarios/eliminar', { id });
                closeModal(); loadData(); showAlert('Veterinario eliminado.', 'success');
            } catch (e) { alert(e.message); }
        }

        function esc(s) { return escapeHtml(String(s)); }
        loadData();
    </script>
</body>
</html>
