<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes — Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="../../../shared/css/admin.css" rel="stylesheet">
</head>
<body>
    <script src="../../../shared/js/api.js"></script>
    <script src="../../../shared/js/auth.js"></script>
    <script src="../../../shared/js/admin-layout.js"></script>
    <script>
        renderAdminLayout('clientes');
        const content = document.getElementById('admin-content');

        async function loadData() {
            content.innerHTML = `
                <div class="page-header">
                    <div><h2><i class="bi bi-people text-amber"></i> Clientes</h2>
                    <p class="muted">Clientes registrados en el sistema</p></div>
                </div>
                <div id="admin-alert" class="admin-alert" style="display:none;"></div>
                <div class="admin-table-wrap"><table class="admin-table">
                    <thead><tr><th>ID</th><th>Identificación</th><th>Nombre</th><th>Apellido</th><th>Email</th><th>Teléfono</th><th>Registro</th></tr></thead>
                    <tbody id="tbody">
                        <tr><td colspan="7" class="text-muted" style="text-align:center;">Cargando...</td></tr>
                    </tbody>
                </table></div>`;

            try {
                const res = await apiGet('/admin/clientes');
                const tbody = document.getElementById('tbody');
                if (!res.data.length) { tbody.innerHTML = '<tr><td colspan="7" class="text-muted" style="text-align:center;">Sin clientes</td></tr>'; return; }
                tbody.innerHTML = res.data.map(c => `<tr>
                    <td>${c.ID_CLIENTE}</td>
                    <td>${esc(c.DIDENTIDAD_CLIENTE)}</td>
                    <td class="text-white">${esc(c.NOMBRE)}</td>
                    <td class="text-white">${esc(c.APELLIDO)}</td>
                    <td>${esc(c.EMAIL)}</td>
                    <td>${esc(c.TELEFONO)}</td>
                    <td>${formatDate(c.FECHA_REGISTRO)}</td>
                </tr>`).join('');
            } catch (e) { showAlert(e.message, 'error'); }
        }

        function formatDate(d) {
            if (!d) return '-';
            const dt = new Date(d);
            return dt.toLocaleDateString('es-CR', { day: '2-digit', month: 'short', year: 'numeric' });
        }

        function esc(s) { return escapeHtml(String(s)); }
        loadData();
    </script>
</body>
</html>
